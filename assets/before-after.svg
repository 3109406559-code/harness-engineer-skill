<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" rx="28" fill="#08111F"/>
  <rect x="28" y="28" width="1144" height="364" rx="24" fill="#111827" stroke="#22314A"/>
  <line x1="600" y1="68" x2="600" y2="352" stroke="#324765" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="72" y="92" fill="#FCA5A5" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Before</text>
  <text x="72" y="124" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="20">Prompt pile. Hidden state. Vague loop. Weak validation.</text>

  <rect x="72" y="162" width="178" height="84" rx="18" fill="#32161F" stroke="#7F1D1D"/>
  <text x="96" y="200" fill="#FECACA" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">One giant prompt</text>
  <text x="96" y="226" fill="#FEE2E2" font-family="Segoe UI, Arial, sans-serif" font-size="15">Everything mixed together</text>

  <rect x="272" y="182" width="154" height="72" rx="18" fill="#2A1C13" stroke="#92400E"/>
  <text x="296" y="215" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Memory drift</text>
  <text x="296" y="238" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="14">Chat is the state</text>

  <rect x="448" y="150" width="108" height="108" rx="22" fill="#291B33" stroke="#7E22CE"/>
  <text x="473" y="203" fill="#F5D0FE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">No gate</text>
  <text x="469" y="228" fill="#FAE8FF" font-family="Segoe UI, Arial, sans-serif" font-size="13">Trust self-report</text>

  <text x="648" y="92" fill="#A7F3D0" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">After</text>
  <text x="648" y="124" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="20">Harness project. File state. Explicit loop. Validator-first progression.</text>

  <rect x="648" y="162" width="164" height="84" rx="18" fill="#10243A" stroke="#2563EB"/>
  <text x="674" y="198" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">AGENTS.md</text>
  <text x="674" y="224" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="15">Entry map, not encyclopedia</text>

  <rect x="836" y="162" width="146" height="84" rx="18" fill="#152C2C" stroke="#1F6B54"/>
  <text x="864" y="198" fill="#A7F3D0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">progress.txt</text>
  <text x="864" y="224" fill="#D1FAE5" font-family="Segoe UI, Arial, sans-serif" font-size="15">Resumable state</text>

  <rect x="1004" y="162" width="116" height="84" rx="18" fill="#2A1632" stroke="#A21CAF"/>
  <text x="1028" y="198" fill="#F5D0FE" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">tasks.json</text>
  <text x="1028" y="224" fill="#FAE8FF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Mutable state</text>

  <rect x="712" y="272" width="154" height="72" rx="18" fill="#241A12" stroke="#B45309"/>
  <text x="741" y="304" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Runner</text>
  <text x="741" y="327" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="14">Explicit loop policy</text>

  <rect x="888" y="272" width="154" height="72" rx="18" fill="#12261E" stroke="#15803D"/>
  <text x="916" y="304" fill="#BBF7D0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Validator</text>
  <text x="916" y="327" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="14">Advance only on pass</text>
</svg>
